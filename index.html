<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Saša Dimitrijević Fotografije</title>
    <style>
        body { font-family: Arial, sans-serif; background: #111; color: white; text-align: center; padding-top: 50px; }
        h1 { color: #ffcc00; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .item { border: 1px solid #444; padding: 10px; background: #222; width: 300px; }
        .item img { width: 100%; border-radius: 5px; }
        .btn { display: inline-block; background: #0070ba; color: white; padding: 10px; text-decoration: none; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Saša Dimitrijević Fotografije</h1>
    <p>Dobrodošli u moju prvu online galeriju!</p>
    <div class="gallery">
        <div class="item">
            <p>Ovde će biti tvoj prvi album.</p>
            <a href="#" class="btn">Uskoro slike</a>
        </div>
    </div>
</body>
</html>
